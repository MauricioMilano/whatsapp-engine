version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: whatsapp-api-postgres
    environment:
      POSTGRES_DB: whatsapp_bot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass123
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d whatsapp_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
